<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Ainul Islam — Document Controller</title>
  <!-- Bootstrap & icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.css" rel="stylesheet">
  
  <style>
    :root {
      --primary:#1f4d9a;
      --accent:#e9eefb;
      --muted:#6c757d;
      --bg-light:#fff;
      --text-light:#263238;
      --bg-dark:#121212;
      --text-dark:#f1f1f1;
      --card-dark:#1e1e1e;
      --accent-dark:#2a2a2a;
    }
    body {
      font-family:'Segoe UI', Roboto, Arial, sans-serif;
      color: var(--text-light);
      background: var(--bg-light);
      transition: background 0.3s, color 0.3s;
    }
    .dark-mode {
      background: var(--bg-dark);
      color: var(--text-dark);
    }
    .dark-mode .navbar,
    .dark-mode footer {
      background: var(--card-dark) !important;
      color: var(--text-dark);
    }
    .dark-mode .info-card {
      background: var(--accent-dark);
      border-left:6px solid var(--primary);
      color: var(--text-dark);
    }
    .dark-mode .section-title .line {
      background: var(--text-dark);
    }
    .dark-mode .skill-badge {
      background: var(--accent-dark);
      color: var(--text-dark);
      border:1px solid rgba(255,255,255,.15);
    }
    .dark-mode .skill-track {
      background:#333;
    }
    .dark-mode .skill-fill {
      background: var(--primary);
    }
    .navbar {box-shadow:0 2px 6px rgba(16,24,40,.06)}
    .hero{background:linear-gradient(90deg,var(--primary),#2b6fb5);color:#fff;padding:50px 0}
    .hero .profile{width:140px;height:140px;border-radius:10px;border:6px solid rgba(255,255,255,.12);object-fit:cover}
    .hero h1{font-weight:700;letter-spacing:1px}
    .section-title{display:flex;align-items:center;margin-bottom:18px}
    .section-title h3{margin:0;font-size:1.1rem;font-weight:700}
    .section-title .line{flex:1;height:2px;background:var(--primary);margin-left:12px;border-radius:2px}
    .resume-row{display:flex;gap:30px}
    .col-left,.col-right{flex:1}
    .info-card{background:var(--accent);border-radius:8px;padding:14px;margin-bottom:10px;border-left:6px solid var(--primary)}
    .skill-badge{display:inline-block;margin:6px 6px 6px 0;padding:8px 12px;border-radius:8px;background:#f3f7ff;color:var(--primary);font-weight:600;border:1px solid rgba(31,77,154,.08)}
    .skill-track{background:#eef3ff;border-radius:14px;padding:6px;margin-bottom:10px}
    .skill-fill{height:14px;border-radius:10px;background:var(--primary);display:block}
    .timeline-item{margin-bottom:18px}
    .timeline-item h5{margin-bottom:6px}
    footer{background:#f8f9fa;padding:18px 0;text-align:center;margin-top:30px;color:var(--muted)}
    @media(max-width:900px){
      .resume-row{flex-direction:column}
      .hero{text-align:center}
      .hero .profile{margin:0 auto}
    }
  </style>
</head>
<body>
  <!-- NAV -->
  <nav class="navbar navbar-expand-lg navbar-light bg-white">
    <div class="container">
      <a class="navbar-brand fw-bold" href="#">Ainul Islam</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navmenu">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navmenu">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" href="#about">About</a></li>
          <li class="nav-item"><a class="nav-link" href="#experience">Experience</a></li>
          <li class="nav-item"><a class="nav-link" href="#education">Education</a></li>
          <li class="nav-item"><a class="nav-link" href="#skills">Skills</a></li>
          <li class="nav-item"><a class="nav-link" href="#contact">Contact</a></li>
          <!-- Dark Mode Toggle -->
          <li class="nav-item ms-3">
            <button id="darkToggle" class="btn btn-outline-secondary btn-sm">
              <i class="fa fa-moon"></i> Dark Mode
            </button>
          </li>
          <!-- PDF Export -->
          <li class="nav-item ms-2">
            <button id="pdfBtn" class="btn btn-outline-primary btn-sm">
              <i class="fa fa-file-pdf"></i> Save as PDF
            </button>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <!-- HERO + MAIN CONTENT (same as before) -->

  <!-- Footer -->
  <footer>
    <div class="container">
      <small>© 2025 Ainul Islam — Document Controller • Built for GitHub Pages</small>
    </div>
  </footer>

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/typed.js@2.0.12"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  
  <script>
    AOS.init({duration:650,once:true});

    new Typed('#typed-text',{
      strings:['Document Controller','Administrative & IT Support','Customer-focused Professional'],
      typeSpeed:60,backSpeed:35,backDelay:1200,loop:true
    });

    document.querySelectorAll('a.nav-link').forEach(a=>{
      a.addEventListener('click', (e)=>{
        e.preventDefault();
        const target=document.querySelector(a.getAttribute('href'));
        if(target) target.scrollIntoView({behavior:'smooth',block:'start'});
      });
    });

    // Dark mode toggle
    document.getElementById("darkToggle").addEventListener("click", function(){
      document.body.classList.toggle("dark-mode");
      this.innerHTML = document.body.classList.contains("dark-mode")
        ? '<i class="fa fa-sun"></i> Light Mode'
        : '<i class="fa fa-moon"></i> Dark Mode';
    });

    // Save as PDF
    document.getElementById("pdfBtn").addEventListener("click", () => {
      const element = document.body;
      html2pdf().from(element).set({
        margin:0.5,
        filename:'Ainul_Islam_CV.pdf',
        image:{ type:'jpeg', quality:0.98 },
        html2canvas:{ scale:2 },
        jsPDF:{ unit:'in', format:'a4', orientation:'portrait' }
      }).save();
    });
  </script>
</body>
</html>
